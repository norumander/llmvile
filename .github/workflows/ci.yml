name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Import + GUT
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/godot
          key: godot-4.3-stable

      - name: Install Godot 4.3-stable headless
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot && cd ~/godot
          curl -L -o godot.zip https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          unzip godot.zip
          mv Godot_v4.3-stable_linux.x86_64 godot
          chmod +x godot

      - name: Put Godot on PATH
        run: echo "$HOME/godot" >> $GITHUB_PATH

      - name: Import project (headless)
        run: |
          set -o pipefail
          godot --headless --import 2>&1 | tee import.log
          # godot-xterm's editor_terminal.gd references the Terminal class which
          # only resolves when the editor loads GDExtensions; under --headless
          # it always fails to parse. Filter that known-benign line out.
          if grep -E "Parse error|Failed to load script" import.log \
              | grep -vE "addons/godot_xterm/editor_plugins/"; then
            echo "::error::Godot reported parse / load errors during import"
            exit 1
          fi

      - name: Run GUT tests
        run: |
          set -o pipefail
          godot --headless -s res://addons/gut/gut_cmdln.gd \
              -gdir=res://test/unit -gexit 2>&1 | tee gut.log
          if grep -E "Parse error|Failed to load script" gut.log \
              | grep -vE "addons/godot_xterm/editor_plugins/"; then
            echo "::error::Godot reported parse / load errors during test run"
            exit 1
          fi
